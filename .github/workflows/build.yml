name: Build Auth Image

on:
  push:
    branches: [main, master]
  workflow_dispatch:

env:
  AUTH_IMAGE: symotus-auth
  REGISTRY: ghcr.io

jobs:
  build-docker:
    name: Build & Push Auth Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.AUTH_IMAGE }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}
      - name: Compute build version
        id: ver
        run: echo "version=$(TZ=Asia/Taipei date +%Y%m%d%H%M)" >> "$GITHUB_OUTPUT"
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=auth
          cache-to: type=gha,scope=auth,mode=max
          build-args: |
            BUILD_VERSION=${{ steps.ver.outputs.version }}

  # 推出新 auth 映像後，觸發 symotus-frontend 的全 stack 部署，
  # 讓伺服器 pull 新的 auth 映像並重啟（前後端共用一份 compose）。
  trigger-deploy:
    name: Trigger full-stack deploy
    needs: build-docker
    runs-on: ubuntu-latest
    steps:
      - name: Check dispatch token
        id: chk
        env:
          TOK: ${{ secrets.DEPLOY_DISPATCH_TOKEN }}
        run: echo "has=${TOK:+yes}" >> "$GITHUB_OUTPUT"
      - name: Dispatch deploy to symotus-frontend
        if: steps.chk.outputs.has == 'yes'
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.DEPLOY_DISPATCH_TOKEN }}
          repository: ${{ github.repository_owner }}/symotus-frontend
          event-type: deploy
      - name: Warn if token missing
        if: steps.chk.outputs.has != 'yes'
        run: echo "::warning::未設定 DEPLOY_DISPATCH_TOKEN（需 repo scope PAT），已略過自動部署。請手動在 symotus-frontend 觸發 deploy。"
